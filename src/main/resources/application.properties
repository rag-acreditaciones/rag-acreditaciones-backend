spring.application.name=rag_daw

#Cambiamos puerto
#server.port=8090

#Debugear
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


# url a la base de datos
# futbol=nombre de la base de datos que hemos creado
spring.datasource.url=jdbc:postgresql://localhost:5432/ragdaw
# nombre de usuario y contraseña
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

#En H2 utilizabamos el dialecto H2Dialect, aquí PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#Para evitar que nombreLargo lo mapee como nombre_largo y no lo encuentre
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# actualizar base de datos y crear entidades (create y drop table) solo en testing, en produccion "none"
spring.jpa.hibernate.ddl-auto=update

#CONFIGURACIÓN SOLO durante las pruebas:
# true solo cuanque queremos ver que hace por debajo y ver tiempos
spring.jpa.properties.hibernate.generate_statistics=false
# Habilitar LOGGER de las estadísticas de hibernate
logging.level.org.hibernate.stat=
# Mostrar que consultas esta realizando Hibernate
# Poner a true solo cuanque queremos ver que hace por debajo
spring.jpa.show-sql=false
# Formatear las consultas
spring.jpa.properties.hibernate.format_sql=true
# Mostrar los parametros que estan enviandose a las consultas
logging.level.org.hibernate.type=debug
#FIN CONFIGURACIÓN SOLO durante las pruebas

#Configuración Springdoc-Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
# SPRING SECURITY Y JWT:
#Variable necesaria para la firma de seguridad
#Debe ser al menos de 256 bits para que no lance excepción de seguridad
security.jwt.secret-key= firmaSeguridadSimarro1DesarrolloWebEntornoServidor
#Tiempo de expiración del token
security.jwt.expiration-time= 36000


# Para obtener API_KEY DE Groq: https://console.groq.com/keys
# 2 OPCIONES para configurar la API_KEY en la webapp de Spring Boot:
# 1º Poner la clave directamente:
# spring.ai.openai.api-key=aqui tu clave
# 2º Utilizar una variable del sistema operativo (GROQ_API_KEY) y leerla aquí:
spring.ai.openai.api-key=${GROQ_API_KEY} 
# Url de la API de GROQ:
spring.ai.openai.base-url=https://api.groq.com/openai


# Al tener en el pom.xml tanto spring-ai-starter-model-ollama como spring-ai-starter-model-openai, 
# Spring Boot autoconfigura dos beans de EmbeddingModel (uno por cada proveedor). 
# Cuando PgVectorStoreAutoConfiguration intenta inyectar un EmbeddingModel, encuentra 2 y no sabe 
# cuál elegir. Como en tu caso tú creas todo programáticamente en RagDynamicConfig, la 
# autoconfiguración estorba y hay que desactivarla.
spring.autoconfigure.exclude=\
  org.springframework.ai.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration,\
  org.springframework.ai.ollama.autoconfigure.OllamaChatAutoConfiguration,\
  org.springframework.ai.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration